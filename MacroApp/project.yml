name: KeyShare
options:
  bundleIdPrefix: com.rampierce
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "3.3.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGN_STYLE: "Manual"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  KeyShare:
    type: application
    platform: macOS
    sources:
      - path: KeyShare
        excludes:
          - "**/*.xcodeproj"
    settings:
      base:
        INFOPLIST_FILE: KeyShare/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rampierce.KeyShare
        CODE_SIGN_ENTITLEMENTS: KeyShare/App/KeyShare.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    info:
      path: KeyShare/App/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright 2026 Ram Pierce"
        NSAccessibilityUsageDescription: "Macro uses Accessibility to simulate keyboard shortcuts and control applications for your macropad."
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)

  KeyShareTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KeyShareTests
    dependencies:
      - target: KeyShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rampierce.KeyShareTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeyShare.app/Contents/MacOS/KeyShare"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  KeyShare:
    build:
      targets:
        KeyShare: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KeyShareTests
