name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Generate Xcode project
        working-directory: MacroApp
        run: xcodegen generate

      - name: Build Universal Binary
        working-directory: MacroApp
        run: |
          xcodebuild archive \
            -scheme KeyShare \
            -archivePath build/KeyShare.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            -quiet

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd MacroApp/build/KeyShare.xcarchive/Products/Applications
          ditto -c -k --sequesterRsrc --keepParent KeyShare.app KeyShare-notarize.zip

          xcrun notarytool submit KeyShare-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple KeyShare.app
          rm KeyShare-notarize.zip

      - name: Package app as zip
        run: |
          cd MacroApp/build/KeyShare.xcarchive/Products/Applications
          ditto -c -k --sequesterRsrc --keepParent KeyShare.app KeyShare.zip
          mv KeyShare.zip "$GITHUB_WORKSPACE/KeyShare.zip"

      - name: Package firmware
        run: |
          ditto -c -k --sequesterRsrc firmware firmware.zip

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KeyShare.zip
            firmware.zip
          generate_release_notes: true
