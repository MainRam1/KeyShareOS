included:
  - MacroApp/KeyShare
excluded:
  - MacroApp/KeyShare.xcodeproj
  - MacroApp/KeyShareTests

disabled_rules:
  - trailing_comma
  - implicit_optional_initialization
  - for_where

opt_in_rules:
  - identical_operands
  - redundant_type_annotation
  - redundant_nil_coalescing
  - duplicate_imports
  - fatal_error_message
  - closure_body_length
  - function_parameter_count
  - sorted_imports

identifier_name:
  min_length: 1
  max_length: 60

line_length:
  warning: 160
  error: 200

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 250
  error: 400

function_body_length:
  warning: 80
  error: 120

closure_body_length:
  warning: 50
  error: 80

cyclomatic_complexity:
  warning: 15
  error: 25

force_unwrapping:
  severity: warning

force_try:
  severity: warning

custom_rules:
  no_direct_cgEvent_outside_actions:
    name: "CGEvent only in Actions/"
    regex: "CGEvent\\("
    message: "CGEvent creation should only happen in Actions/ files"
    severity: warning
    included: "MacroApp/KeyShare/(?!Actions/|Utilities/KeyEventHelper).*\\.swift"

  no_hardcoded_config_path:
    name: "Use Constants for file paths"
    regex: "Application Support.*Macro"
    match_kinds:
      - string
    message: "Use Constants.configDirectory instead of hardcoded paths"
    severity: error
